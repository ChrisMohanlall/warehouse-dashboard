<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Tracker Pro - Driver Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
        nav { background: #333; padding: 15px; text-align: center; }
        nav button { background: none; color: white; border: none; font-size: 14px; padding: 10px 15px; cursor: pointer; font-weight: bold; margin: 0 5px;}
        nav button:hover { background: #555; border-radius: 4px;}
        nav button.active { background: #007bff; border-radius: 4px;}

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .view-section { display: none; } 
        #driver-view { display: block; } 
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 800px; margin: 0 auto;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px;}
        h2 { margin-top: 0; color: #333; font-size: 1.3rem; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;} /* Larger font for mobile tapping */
        
        button.btn { margin-top: 15px; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; color: white;}
        .btn-blue { background: #007bff; } .btn-blue:hover { background: #0056b3; }
        .btn-green { background: #28a745; } .btn-green:hover { background: #218838; }
        .btn-red { background: #dc3545; } .btn-red:hover { background: #c82333; }
        .btn-inline { width: auto; padding: 10px 15px; margin-top: 5px; font-size: 14px;}

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;}
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 300px; }
    </style>
</head>
<body>

<nav>
    <button onclick="switchTab('driver-view', this)" class="active">Driver Portal</button>
    <button onclick="switchTab('schedule-view', this)">Race Schedule</button>
    <button onclick="switchTab('resources-view', this)">Resource Lists</button>
</nav>

<div class="container">
    
    <div id="driver-view" class="view-section">
        <div class="form-grid">
            <div class="card">
                <h2>Log Trip</h2>
                <form id="tripForm">
                    <label>Driver:</label>
                    <select id="trip_driver" onchange="checkNewDriver(this)" required></select>
                    
                    <label>Truck:</label>
                    <select id="trip_truck" required></select>
                    
                    <label>Parked Location (Destination):</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="trip_location" required style="flex: 1;"></select>
                        <button type="button" class="btn btn-blue btn-inline" onclick="useDeviceLocation()" style="margin-top: 0;">📍 Auto-Locate</button>
                    </div>
                    <div id="location_status" style="font-size: 0.85rem; color: #666; margin-top: 5px;"></div>

                    <label>Current Trip End KM:</label><input type="number" id="trip_km" required>
                    <label>End Fuel (%):</label><input type="number" id="trip_fuel" required>
                    <label>Damage Notes:</label><textarea id="trip_notes"></textarea>
                    <button type="submit" class="btn btn-blue">Submit Log</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Fuel Up</h2>
                <form id="fuelForm">
                    <label>Driver:</label><select id="fuel_driver" onchange="checkNewDriver(this)" required></select>
                    <label>Truck:</label><select id="fuel_truck" required></select>
                    <label>KM at Fuel Up:</label><input type="number" id="fuel_km" required>
                    <label>Receipt Photo URL:</label><input type="text" id="fuel_receipt" required>
                    <button type="submit" class="btn btn-green">Log Fuel</button>
                </form>
            </div>
        </div>
    </div>

    <div id="schedule-view" class="view-section">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2>Race Schedule</h2>
            <input type="text" id="master_schedule_link" placeholder="Paste link to Master Schedule...">
            <button class="btn btn-blue" onclick="window.open(document.getElementById('master_schedule_link').value, '_blank')">Open Schedule</button>
        </div>
    </div>

    <div id="resources-view" class="view-section">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2>Truck Resource Sheets</h2>
            <div id="resource-buttons" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>
    </div>
</div>

<div id="driverModal" class="modal">
    <div class="modal-content">
        <h3>Add New Driver</h3>
        <label>First Name:</label><input type="text" id="new_dr_first">
        <label>Last Initial:</label><input type="text" id="new_dr_last" maxlength="1">
        <label>Phone:</label><input type="text" id="new_dr_phone">
        <button class="btn btn-green" onclick="saveDriver()">Save Driver</button>
        <button class="btn btn-red" onclick="document.getElementById('driverModal').style.display='none'">Cancel</button>
    </div>
</div>

<script>
    const API_URL = "https://crsdashboard.onrender.com";
    
    let globalLocations = [];
    let exactParkedLat = null;
    let exactParkedLng = null;

    // --- GEOLOCATION ALGORITHMS ---
    function getDistanceInKm(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * (Math.PI / 180);
        const dLon = (lon2 - lon1) * (Math.PI / 180);
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; 
    }

    function useDeviceLocation() {
        const statusLabel = document.getElementById('location_status');
        statusLabel.textContent = "Searching for GPS signal...";

        if (!navigator.geolocation) {
            statusLabel.textContent = "Geolocation is not supported by your browser.";
            return;
        }

        navigator.geolocation.getCurrentPosition((position) => {
            exactParkedLat = position.coords.latitude;
            exactParkedLng = position.coords.longitude;
            
            let nearestLoc = null;
            let shortestDistance = Infinity;

            globalLocations.forEach(loc => {
                let distance = getDistanceInKm(exactParkedLat, exactParkedLng, loc.lat, loc.lng);
                if (distance < shortestDistance) {
                    shortestDistance = distance;
                    nearestLoc = loc;
                }
            });

            if (nearestLoc) {
                document.getElementById('trip_location').value = nearestLoc.id;
                statusLabel.innerHTML = `<span style="color: green;">✔ Exact location locked.</span> Nearest zone is ${nearestLoc.name} (${shortestDistance.toFixed(2)} km away).`;
            }
        }, (error) => {
            statusLabel.innerHTML = `<span style="color: red;">❌ Unable to get location. Ensure location permissions are granted.</span>`;
            console.error(error);
        }, { enableHighAccuracy: true });
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
        document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        btn.classList.add('active');
    }

    // --- DATA LOADING & API CALLS ---
    function loadData() {
        fetch(`${API_URL}/drivers/`).then(res=>res.json()).then(data => {
            const sels = ['trip_driver', 'fuel_driver'];
            sels.forEach(id => document.getElementById(id).innerHTML = '<option value="">Select...</option><option value="NEW" style="font-weight:bold; color:blue;">+ Add New Driver...</option>');
            data.forEach(d => {
                sels.forEach(id => document.getElementById(id).innerHTML += `<option value="${d.id}">${d.first_name} ${d.last_initial}.</option>`);
            });
        });

        fetch(`${API_URL}/locations/`).then(res=>res.json()).then(data => {
            globalLocations = data;
            const sels = ['trip_location'];
            sels.forEach(id => document.getElementById(id).innerHTML = '');
            data.forEach(loc => {
                sels.forEach(id => document.getElementById(id).innerHTML += `<option value="${loc.id}">${loc.name}</option>`);
            });
        });

        fetch(`${API_URL}/trucks/`).then(res=>res.json()).then(data => {
            const resButtons = document.getElementById('resource-buttons');
            const sels = ['trip_truck', 'fuel_truck'];
            sels.forEach(id => document.getElementById(id).innerHTML = '');
            
            data.forEach(t => {
                sels.forEach(id => document.getElementById(id).innerHTML += `<option value="${t.id}">${t.truck_name}</option>`);
                if(t.resource_excel_url) {
                    resButtons.innerHTML += `<button class="btn btn-blue btn-inline" onclick="window.open('${t.resource_excel_url}', '_blank')">${t.truck_name} Resources</button>`;
                }
            });
        });
    }

    // Load data immediately on page load since we don't have to wait for a map to render
    loadData();

    // --- FORM SUBMISSIONS ---
    function checkNewDriver(selectElement) {
        if(selectElement.value === "NEW") {
            document.getElementById('driverModal').style.display = 'flex';
            selectElement.value = ""; 
        }
    }

    function saveDriver() {
        fetch(`${API_URL}/drivers/`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                first_name: document.getElementById('new_dr_first').value,
                last_initial: document.getElementById('new_dr_last').value,
                phone: document.getElementById('new_dr_phone').value
            })
        }).then(() => location.reload());
    }

    document.getElementById('tripForm').addEventListener('submit', e => {
        e.preventDefault();
        fetch(`${API_URL}/trip-logs/`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                driver_id: parseInt(document.getElementById('trip_driver').value),
                truck_id: parseInt(document.getElementById('trip_truck').value),
                destination_location_id: parseInt(document.getElementById('trip_location').value),
                current_trip_end_km: parseFloat(document.getElementById('trip_km').value),
                end_fuel: parseFloat(document.getElementById('trip_fuel').value),
                damage_notes: document.getElementById('trip_notes').value,
                exact_lat: exactParkedLat,
                exact_lng: exactParkedLng
            })
        }).then(() => location.reload());
    });

    document.getElementById('fuelForm').addEventListener('submit', e => {
        e.preventDefault();
        fetch(`${API_URL}/fuel-logs/`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                driver_id: parseInt(document.getElementById('fuel_driver').value),
                truck_id: parseInt(document.getElementById('fuel_truck').value),
                km_at_fuel_up: parseFloat(document.getElementById('fuel_km').value),
                receipt_url: document.getElementById('fuel_receipt').value
            })
        }).then(() => location.reload());
    });
</script>

</body>
</html>
