<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRS Driver Portal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRS Drivers">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

    <style>
        :root { --primary: #007bff; --success: #34c759; --danger: #ff3b30; --bg: #f2f2f7; --surface: #ffffff; --text: #1c1c1e; --text-muted: #8e8e93; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; overscroll-behavior-y: none; }
        input, select, textarea { user-select: auto; }
        
        nav.bottom-bar { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; box-shadow: 0 -1px 0 rgba(0,0,0,0.1); z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px); }
        nav.bottom-bar button { background: none; border: none; color: var(--text-muted); font-size: 12px; padding: 12px 0; flex: 1; text-align: center; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav.bottom-bar button.active { color: var(--primary); }
        nav.bottom-bar button::before { font-size: 20px; }
        
        .container { padding: calc(env(safe-area-inset-top, 0px) + 70px) 15px calc(env(safe-area-inset-bottom, 0px) + 90px) 15px; max-width: 600px; margin: 0 auto; }
        .view-section { display: none; animation: fadeIn 0.2s ease-in-out; } 
        #driver-view { display: block; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 15px;}
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85rem; color: var(--text-muted);}
        input, select, textarea { width: 100%; padding: 14px; margin-top: 8px; box-sizing: border-box; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 16px; background: #fafafa; appearance: none; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: var(--surface);}
        
        button.btn { margin-top: 20px; padding: 16px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; color: white; transition: transform 0.1s; }
        button.btn:active { transform: scale(0.97); } 
        .btn-blue { background: var(--primary); } .btn-green { background: var(--success); } .btn-red { background: var(--danger); } 
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
        .modal-content { background: var(--surface); padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg, #f4f4f9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ccc; border-top-color: #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { font-weight: bold; font-size: 1.1rem; color: #333; margin-bottom: 5px; }
        #loading-subtext { font-size: 0.9rem; color: #666; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Connecting to Server...</div>
    <div id="loading-subtext"></div>
</div>

<header id="mobile-banner" style="background: var(--primary); color: white; padding: calc(env(safe-area-inset-top, 0px) + 10px) 15px 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;">
    <img src="https://github.com/ChrisMohanlall/warehouse-dashboard/blob/main/icons/crsbanner.png?raw=true" alt="CRS" style="height: 28px;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span id="banner-race-name" style="font-weight: bold; font-size: 16px;">Loading Event...</span>
        <img id="banner-race-logo" src="" alt="Race Logo" style="height: 28px; display: none; border-radius: 4px; background: white; padding: 2px;">
    </div>
</header>

<div class="container">
    <div id="map-view" class="view-section">
        <div class="card" style="padding: 0; overflow: hidden; height: calc(100vh - 180px);">
            <div id="mobile-map" style="width: 100%; height: 100%;"></div>
        </div>
    </div>
    
    <div id="driver-view" class="view-section">
        <div class="form-grid">
            <div class="card">
                <h2>Log Trip</h2>
                <form id="tripForm">
                    <label>Driver</label><select id="trip_driver" onchange="checkDropdowns()" required></select>
                    <label>Truck</label><select id="trip_truck" required></select>
                    <label>Parked Location</label><select id="trip_location" onchange="checkDropdowns()" required></select>
                    <label>Current Trip End KM</label><input type="number" id="trip_km" required step="0.1" inputmode="decimal"> 
                    <label>End Fuel (%)</label><input type="number" id="trip_fuel" required inputmode="numeric">
                    <label>Damage Notes</label><textarea id="trip_notes" rows="3"></textarea>
                    <button type="submit" class="btn btn-blue">Submit Trip Log</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Fuel Up</h2>
                <form id="fuelForm">
                    <label>Driver</label><select id="fuel_driver" onchange="checkDropdowns()" required></select>
                    <label>Truck</label><select id="fuel_truck" required></select>
                    <label>KM at Fuel Up</label><input type="number" id="fuel_km" required step="0.1" inputmode="decimal">
                    <label>Receipt Photo URL</label><input type="text" id="fuel_receipt" required>
                    <button type="submit" class="btn btn-green">Log Fuel Up</button>
                </form>
            </div>
        </div>
    </div>

    <div id="schedule-view" class="view-section">
        <div class="card">
            <h2>Race Schedule</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Access the master logistics schedule below.</p>
            <input type="url" id="master_schedule_link" placeholder="Paste link here...">
            <button class="btn btn-blue" onclick="window.open($('master_schedule_link').value, '_blank')">Open Schedule</button>
        </div>
    </div>

    <div id="resources-view" class="view-section">
        <div class="card">
            <h2>Truck Resources</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Select your truck to open its inventory sheet.</p>
            <div id="resource-buttons" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </div>
</div>

<nav class="bottom-bar">
    <button id="btn-driver" onclick="switchTab('driver-view', this)" class="active">Log</button>
    <button id="btn-map" onclick="switchTab('map-view', this)" style="font-size: 20px;">🗺️</button>
    <button id="btn-schedule" onclick="switchTab('schedule-view', this)">Schedule</button>
    <button id="btn-resources" onclick="switchTab('resources-view', this)">Resources</button>
</nav>

<div id="driverModal" class="modal">
    <div class="modal-content">
        <h3>Add New Driver</h3>
        <label>First Name:</label><input type="text" id="new_dr_first">
        <label>Last Initial:</label><input type="text" id="new_dr_last" maxlength="1">
        <label>Phone:</label><input type="tel" id="new_dr_phone" inputmode="tel">
        <button class="btn btn-green" onclick="saveDriver()">Save Driver</button>
        <button class="btn btn-red" onclick="$('driverModal').style.display='none'">Cancel</button>
    </div>
</div>

<div id="locationModal" class="modal">
    <div class="modal-content">
        <h3>Add Missing Location</h3>
        <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0;">Provide a description so the Admin team can set the coordinates later.</p>
        <label>Your Name (Driver):</label>
        <select id="new_loc_driver" onchange="checkDropdowns()" required></select>
        <label>Location Name (e.g. Toronto Track):</label><input type="text" id="new_loc_name">
        <label>Sub Location (e.g. Loading Bay 2):</label><input type="text" id="new_loc_type">
        <label>Where is this?</label><textarea id="new_loc_desc" rows="3" placeholder="Describe where you parked..."></textarea>
        <button class="btn btn-blue" onclick="saveLocation()">Add to List</button>
        <button class="btn btn-red" onclick="$('locationModal').style.display='none'">Cancel</button>
    </div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script>
    const API_URL = "https://crsdashboard.onrender.com";
    const defaultLngLat = [-79.347015, 43.651070]; 
    window.isDriverApp = true; 
    window.$ = id => document.getElementById(id);
    
    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_URL}${endpoint}`, options);
        if (!res.ok) throw new Error("API Connection Failed");
        return res.json();
    }
    
    let mobileMap; let markers = []; let routeMarkers = {};

    function switchTab(tabId, btn) {
        document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
        document.querySelectorAll('nav.bottom-bar button').forEach(el => el.classList.remove('active'));
        $(tabId).style.display = 'block';
        if(btn) btn.classList.add('active');
        if(tabId === 'map-view' && typeof mobileMap !== 'undefined') {
            setTimeout(() => mobileMap.resize(), 100);
        }
        window.scrollTo(0, 0); 
    }

    async function loadData() {
        $('loading-overlay').style.display = 'none';

        if(!mobileMap) {
            const config = await apiCall('/config/');
            mapboxgl.accessToken = config.mapbox_token;
            mobileMap = new mapboxgl.Map({ container: 'mobile-map', style: 'mapbox://styles/mapbox/streets-v12', center: defaultLngLat, zoom: 11 });
            mobileMap.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
            
            mobileMap.on('zoom', () => scaleRouteMarkers(mobileMap));
        }

        const [drivers, locations, trucks, raceSettings, routes, raceLogo] = await Promise.all([
            apiCall('/drivers/'),
            apiCall('/locations/'),
            apiCall('/trucks/'),
            apiCall('/settings/race_name'),
            apiCall('/settings/list/routes'),
            apiCall('/settings/race_logo')
        ]);
            
        $('banner-race-name').innerText = raceSettings.value;
        if(raceLogo.value && raceLogo.value !== 'CRS Event') {
            $('banner-race-logo').src = raceLogo.value;
            $('banner-race-logo').style.display = 'block';
        } else {
            $('banner-race-logo').style.display = 'none';
        }

        ['trip_driver', 'fuel_driver', 'new_loc_driver'].forEach(id => { 
            $(id).innerHTML = '<option value="">Select driver...</option><option value="NEW" style="font-weight:bold; color:#007bff;">+ Add New Driver...</option>'; 
            drivers.forEach(d => { $(id).innerHTML += `<option value="${d.id}">${d.first_name} ${d.last_initial}.</option>`; }); 
        });

        $('trip_location').innerHTML = '<option value="">Select parked location...</option><option value="NEW" style="font-weight:bold; color:#007bff;">+ Location Missing? Add it...</option>'; 
        locations.forEach(loc => { $('trip_location').innerHTML += `<option value="${loc.id}">${loc.name} - ${loc.type}</option>`; }); 

        ['trip_truck', 'fuel_truck'].forEach(id => { $(id).innerHTML = '<option value="">Select truck...</option>'; });
        $('resource-buttons').innerHTML = '';
        
        trucks.forEach(t => {
            ['trip_truck', 'fuel_truck'].forEach(id => { $(id).innerHTML += `<option value="${t.id}">${t.truck_name}</option>`; });
            if(t.resource_excel_url) $('resource-buttons').innerHTML += `<button class="btn btn-blue" style="margin-top: 0;" onclick="window.open('${t.resource_excel_url}', '_blank')">${t.truck_name} Inventory</button>`; 
        });

        markers.forEach(m => m.remove()); markers = [];
        
        locations.forEach(loc => buildMarker(loc, 'loc', mobileMap));
        trucks.forEach(trk => buildMarker(trk, 'trk', mobileMap));
        
        routes.items.forEach((url, i) => drawRouteOnMap(url, `route-${i}`, mobileMap));
        
        let excessIdx = routes.items.length;
        while (mobileMap && mobileMap.getSource(`route-${excessIdx}`)) {
            if (mobileMap.getLayer(`route-${excessIdx}-line`)) mobileMap.removeLayer(`route-${excessIdx}-line`);
            if (mobileMap.getLayer(`route-${excessIdx}`)) mobileMap.removeLayer(`route-${excessIdx}`); 
            mobileMap.removeSource(`route-${excessIdx}`);
            
            if (routeMarkers[`route-${excessIdx}`]) {
                routeMarkers[`route-${excessIdx}`].forEach(m => m.remove());
                delete routeMarkers[`route-${excessIdx}`];
            }
            excessIdx++;
        }
    }

    function buildMarker(entity, type, targetMap) {
        if (entity.lat === null) return;
        let el = document.createElement('div');
        if (entity.icon_url) {
            el.style.width = '32px'; el.style.height = '32px';
            el.style.backgroundImage = `url('${entity.icon_url}')`;
            el.style.backgroundSize = 'contain';
            el.style.backgroundRepeat = 'no-repeat';
            el.style.backgroundPosition = 'center';
            el.style.cursor = 'pointer';
        } else {
            el = null; 
        }
        
        let html = type === 'loc' ? `<b>${entity.name}</b><br>${entity.type}` : `<b>${entity.truck_name}</b><br>Status: ${entity.status}<br>Driver: ${entity.current_driver_name}`;
        
        if (window.isDriverApp) {
            html += `<br><a href="https://www.google.com/maps/dir/?api=1&destination=${entity.lat},${entity.lng}" target="_blank" style="display:block; margin-top:10px; padding:8px; background:#007bff; color:white; text-align:center; text-decoration:none; border-radius:4px; font-weight:bold;">🧭 Navigate Here</a>`;
        }

        const marker = el ? new mapboxgl.Marker(el) : new mapboxgl.Marker();
        marker.setLngLat([entity.lng, entity.lat]).setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(html)).addTo(targetMap);
        entity.markerRef = marker; markers.push(marker);
    }

    async function drawRouteOnMap(url, layerId, targetMap) {
        if (!targetMap.loaded()) { targetMap.once('load', () => drawRouteOnMap(url, layerId, targetMap)); return; }
        
        try {
            const response = await fetch(url);
            const data = await response.json();

            const lines = { type: 'FeatureCollection', features: data.features.filter(f => f.geometry.type.includes('LineString')) };
            const points = data.features.filter(f => f.geometry.type === 'Point');

            if (!targetMap.getSource(layerId)) {
                targetMap.addSource(layerId, { type: 'geojson', data: lines });
                targetMap.addLayer({ 
                    id: `${layerId}-line`, 
                    type: 'line', 
                    source: layerId, 
                    layout: { 'line-join': 'round', 'line-cap': 'round' }, 
                    paint: { 'line-color': '#FF5733', 'line-width': 5 } 
                });
            } else {
                targetMap.getSource(layerId).setData(lines);
            }

            if (routeMarkers[layerId]) {
                routeMarkers[layerId].forEach(m => m.remove());
            }
            routeMarkers[layerId] = [];

            points.forEach((pt, index) => {
                const coords = pt.geometry.coordinates;
                const name = pt.properties.name || `Waypoint ${index + 1}`;
                const desc = pt.properties.description || '';
                
                const nameLower = name.toLowerCase();
                let pinColor = '#8e8e93'; 
                if(nameLower.includes('start')) pinColor = '#34c759'; 
                else if(nameLower.includes('finish') || nameLower.includes('end')) pinColor = '#ff3b30'; 
                else if(nameLower.includes('water') || nameLower.includes('hydration') || nameLower.includes('aid')) pinColor = '#007bff'; 
                else if(nameLower.includes('km') || nameLower.includes('mile') || nameLower.includes('marker')) pinColor = '#ffcc00'; 
                else if(nameLower.includes('medical') || nameLower.includes('first aid')) pinColor = '#ff3b30'; 
                
                let popupHtml = `<b>${name}</b>`;
                if (desc) popupHtml += `<br><span style="font-size:0.85rem;color:#666;">${desc}</span>`;
                
                if (window.isDriverApp) {
                    popupHtml += `<br><a href="https://www.google.com/maps/dir/?api=1&destination=${coords[1]},${coords[0]}" target="_blank" style="display:block; margin-top:10px; padding:8px; background:#007bff; color:white; text-align:center; text-decoration:none; border-radius:4px; font-weight:bold;">🧭 Navigate Here</a>`;
                }

                const marker = new mapboxgl.Marker({ color: pinColor })
                    .setLngLat([coords[0], coords[1]])
                    .setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(popupHtml))
                    .addTo(targetMap);
                
                routeMarkers[layerId].push(marker);
            });

            scaleRouteMarkers(targetMap);

        } catch (err) {
            console.error("Failed to render interactive route data:", err);
        }
    }

    loadData();

    function checkDropdowns() {
        if($('trip_driver').value === "NEW" || $('fuel_driver').value === "NEW" || $('new_loc_driver').value === "NEW") {
            $('locationModal').style.display = 'none'; 
            $('driverModal').style.display = 'flex';
            $('trip_driver').value = ""; $('fuel_driver').value = ""; $('new_loc_driver').value = "";
        }
        if($('trip_location').value === "NEW") {
            $('locationModal').style.display = 'flex';
            $('trip_location').value = "";
        }
    }

    async function saveDriver() {
        await apiCall('/drivers/', 'POST', { 
            first_name: $('new_dr_first').value, 
            last_initial: $('new_dr_last').value, 
            phone: $('new_dr_phone').value 
        });
        $('new_dr_first').value = ''; $('new_dr_last').value = ''; $('new_dr_phone').value = '';
        $('driverModal').style.display='none'; 
        loadData(); 
    }

    function scaleRouteMarkers(targetMap) {
        const zoom = targetMap.getZoom();
        const scale = Math.max(0.4, Math.min(1, (zoom - 9) / 5)); 
        
        Object.values(routeMarkers).forEach(markerArray => {
            markerArray.forEach(m => {
                const svg = m.getElement().querySelector('svg');
                if (svg) {
                    svg.style.transform = `scale(${scale})`;
                    svg.style.transformOrigin = 'bottom center';
                    svg.style.transition = 'transform 0.1s ease';
                }
            });
        });
    }

    async function saveLocation() {
        const drSelect = $('new_loc_driver');
        if (drSelect.selectedIndex <= 0 || !drSelect.value) { alert("Please select your name from the Driver dropdown first."); return; }
        
        const userName = drSelect.options[drSelect.selectedIndex].text;
        await apiCall('/locations/', 'POST', { 
            name: $('new_loc_name').value, 
            type: $('new_loc_type').value, 
            description: $('new_loc_desc').value, 
            user: userName 
        });
        
        $('new_loc_name').value = ''; $('new_loc_type').value = ''; $('new_loc_desc').value = ''; $('new_loc_driver').value = '';
        $('locationModal').style.display='none'; 
        loadData(); 
    }

    $('tripForm').addEventListener('submit', async e => {
        e.preventDefault();
        await apiCall('/trip-logs/', 'POST', {
            driver_id: parseInt($('trip_driver').value),
            truck_id: parseInt($('trip_truck').value),
            destination_location_id: parseInt($('trip_location').value),
            current_trip_end_km: parseFloat($('trip_km').value),
            end_fuel: parseFloat($('trip_fuel').value),
            damage_notes: $('trip_notes').value
        });
        alert("Trip logged successfully!"); 
        $('tripForm').reset(); 
        loadData(); 
    });

    $('fuelForm').addEventListener('submit', async e => {
        e.preventDefault();
        await apiCall('/fuel-logs/', 'POST', {
            driver_id: parseInt($('fuel_driver').value),
            truck_id: parseInt($('fuel_truck').value),
            km_at_fuel_up: parseFloat($('fuel_km').value),
            receipt_url: $('fuel_receipt').value
        });
        alert("Fuel up logged successfully!"); 
        $('fuelForm').reset(); 
        loadData(); 
    });

    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));

    setInterval(() => {
        const isLoggingTrip = $('trip_km') && $('trip_km').value !== "";
        const isLoggingFuel = $('fuel_km') && $('fuel_km').value !== "";
        const isModalOpen = ($('driverModal') && $('driverModal').style.display === 'flex') || 
                            ($('locationModal') && $('locationModal').style.display === 'flex');
        
        if (!isLoggingTrip && !isLoggingFuel && !isModalOpen) {
            
            const currentTripDriver = $('trip_driver').value;
            const currentTripTruck = $('trip_truck').value;
            const currentTripLoc = $('trip_location').value;

            loadData().then(() => {
                $('trip_driver').value = currentTripDriver;
                $('trip_truck').value = currentTripTruck;
                $('trip_location').value = currentTripLoc;
            });
        }
    }, 30000);
</script>
</body>
</html>
